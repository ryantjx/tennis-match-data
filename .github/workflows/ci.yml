name: Validate data

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: ruff check src tests
      - run: mypy src/open_tennis_data
      - run: coverage run -m unittest discover -s tests -v
      - run: coverage report
      - run: open-tennis-data validate
      - name: Enforce Parquet-only published data
        run: test -z "$(find data contributions -type f ! -name '*.parquet' -print -quit)"
      - name: Enforce 75 MB data-file limit
        run: test -z "$(find data contributions -name '*.parquet' -size +75M -print -quit)"

  schema-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: python -m unittest tests.test_v32_contract -v
      - name: Run migration equivalence or historical immutability gate
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          git show "origin/$BASE_REF:data/catalog/catalog.parquet" > "$RUNNER_TEMP/base-catalog.parquet"
          git show "origin/$BASE_REF:data/matches/tour=atp/year=2025/matches.parquet" > "$RUNNER_TEMP/base-match.parquet"
          if python - "$RUNNER_TEMP/base-match.parquet" <<'PY'
          import sys
          import duckdb
          path = sys.argv[1].replace("'", "''")
          metadata = {
              key.decode(): value.decode()
              for _, key, value in duckdb.connect().execute(
                  f"SELECT * FROM parquet_kv_metadata('{path}')"
              ).fetchall()
          }
          raise SystemExit(0 if metadata.get("open_tennis_data_schema_version") == "3.2" else 1)
          PY
          then
            open-tennis-data validate \
              --baseline-catalog "$RUNNER_TEMP/base-catalog.parquet" \
              --immutable-before-year "$(date -u +%Y)"
          else
            mkdir -p "$RUNNER_TEMP/v3.1"
            git archive "origin/$BASE_REF" data | tar -x -C "$RUNNER_TEMP/v3.1"
            open-tennis-data migrate-v3-2 \
              --data "$RUNNER_TEMP/v3.1/data" \
              --output "$RUNNER_TEMP/migrated-v3.2" \
              --report "$RUNNER_TEMP/migration-report"
            python - "$RUNNER_TEMP/migrated-v3.2" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path
          checked = Path("data")
          migrated = Path(sys.argv[1])
          report = json.loads(Path("reports/v3.2/migration-v3.2.json").read_text())
          generated = json.loads(
              (Path(sys.argv[1]).parent / "migration-report/migration-v3.2.json").read_text()
          )
          assert report["status"] == generated["status"] == "passed"
          assert report["old_match_rows"] == report["new_match_rows"]
          assert report["retained_differences"] == generated["retained_differences"] == 0
          checked_files = {path.relative_to(checked) for path in checked.rglob("*.parquet")}
          migrated_files = {path.relative_to(migrated) for path in migrated.rglob("*.parquet")}
          assert checked_files == migrated_files
          for relative in checked_files:
              assert hashlib.sha256((checked / relative).read_bytes()).digest() == hashlib.sha256(
                  (migrated / relative).read_bytes()
              ).digest(), relative
          PY
            open-tennis-data validate
          fi

  integration-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: coverage run -m unittest discover -s tests -v
      - name: Pin archive revision for deterministic builds
        run: |
          echo "SOURCE_REVISION=$(python -c 'from open_tennis_data.dataset import resolve_archive_revision; print(resolve_archive_revision())')" >> "$GITHUB_ENV"
      - name: Exercise the pinned-source build
        run: |
          coverage run --append -m open_tennis_data.cli build \
            --years "$(date -u +%Y)" --as-of "$(date -u +%F)" \
            --source-revision "$SOURCE_REVISION" \
            --output "$RUNNER_TEMP/tennis-data"
      - name: Prove two-build byte determinism
        run: |
          open-tennis-data build \
            --years "$(date -u +%Y)" --as-of "$(date -u +%F)" \
            --source-revision "$SOURCE_REVISION" \
            --output "$RUNNER_TEMP/tennis-data-repeat"
          python - "$RUNNER_TEMP/tennis-data" "$RUNNER_TEMP/tennis-data-repeat" <<'PY'
          import hashlib
          import sys
          from pathlib import Path
          first, second = map(Path, sys.argv[1:])
          first_files = {path.relative_to(first) for path in first.rglob("*.parquet")}
          second_files = {path.relative_to(second) for path in second.rglob("*.parquet")}
          assert first_files == second_files
          for relative in first_files:
              assert hashlib.sha256((first / relative).read_bytes()).digest() == hashlib.sha256(
                  (second / relative).read_bytes()
              ).digest(), relative
          PY
      - run: coverage run --append -m open_tennis_data.cli validate --data "$RUNNER_TEMP/tennis-data"
      - run: |
          coverage run --append -m open_tennis_data.cli query \
            --data "$RUNNER_TEMP/tennis-data" --tour all \
            --sql "SELECT tour, count(*) FROM matches GROUP BY tour"
      - run: |
          coverage run --append -m open_tennis_data.cli extract \
            --data "$RUNNER_TEMP/tennis-data" --tour atp --levels itf \
            --output "$RUNNER_TEMP/itf.parquet"
      - run: |
          coverage run --append -m open_tennis_data.cli refresh-wikimedia \
            --data "$RUNNER_TEMP/tennis-data" --as-of "$(date -u +%F)"
      - run: |
          coverage run --append -m open_tennis_data.cli audit-retroactive \
            --data "$RUNNER_TEMP/tennis-data" --as-of "$(date -u +%F)" \
            --output "$RUNNER_TEMP/retroactive-audit"
      - run: |
          coverage run --append -m open_tennis_data.cli downloads \
            --data "$RUNNER_TEMP/tennis-data" --output "$RUNNER_TEMP/downloads"
      - run: bash scripts/verify-downloads.sh "$RUNNER_TEMP/downloads"
      - run: |
          coverage run --append -m open_tennis_data.cli downloads --future-only \
            --data "$RUNNER_TEMP/tennis-data" --output "$RUNNER_TEMP/future-downloads"
      - run: bash scripts/verify-downloads.sh "$RUNNER_TEMP/future-downloads" future
      - run: cp -a "$RUNNER_TEMP/tennis-data" "$RUNNER_TEMP/tennis-copy"
      - run: |
          coverage run --append -m open_tennis_data.cli promote \
            --source "$RUNNER_TEMP/tennis-data" --target "$RUNNER_TEMP/tennis-copy"
      - run: coverage report --fail-under=90

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser

  required-status:
    if: always()
    needs: [test, schema-contract, integration-coverage, browser-smoke]
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      TEST_RESULT: ${{ needs.test.result }}
      SCHEMA_RESULT: ${{ needs.schema-contract.result }}
      INTEGRATION_RESULT: ${{ needs.integration-coverage.result }}
      BROWSER_RESULT: ${{ needs.browser-smoke.result }}
    steps:
      - name: Publish required validation status
        run: |
          state=failure
          description="Data validation failed"
          if [ "$TEST_RESULT" = success ] && [ "$SCHEMA_RESULT" = success ] && [ "$INTEGRATION_RESULT" = success ] && [ "$BROWSER_RESULT" = success ]; then
            state=success
            description="Python, integration, data, and browser validation passed"
          fi
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$STATUS_SHA" \
            -f state="$state" \
            -f context=data-required \
            -f description="$description"
          test "$state" = success
