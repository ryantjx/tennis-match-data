name: Validate data

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: ruff check src tests
      - run: mypy src/open_tennis_data
      - run: coverage run -m unittest discover -s tests -v
      - run: coverage report
      - run: open-tennis-data validate
      - name: Enforce historical immutability after the lean baseline
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --depth=1 origin "$BASE_REF"
          git show "origin/$BASE_REF:data/catalog/catalog.parquet" > "$RUNNER_TEMP/base-catalog.parquet"
          if python - "$RUNNER_TEMP/base-catalog.parquet" <<'PY'
          import sys
          import duckdb
          path = sys.argv[1].replace("'", "''")
          tables = {row[0] for row in duckdb.connect().execute(
              f"SELECT DISTINCT table_name FROM read_parquet('{path}')"
          ).fetchall()}
          raise SystemExit(0 if 'tournaments' in tables else 1)
          PY
          then
            open-tennis-data validate \
              --baseline-catalog "$RUNNER_TEMP/base-catalog.parquet" \
              --immutable-before-year "$(date -u +%Y)"
          else
            echo "Lean baseline is not on the base branch yet; migration PR is exempt."
          fi
      - name: Enforce Parquet-only published data
        run: test -z "$(find data contributions -type f ! -name '*.parquet' -print -quit)"
      - name: Enforce 75 MB data-file limit
        run: test -z "$(find data contributions -name '*.parquet' -size +75M -print -quit)"

  integration-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: coverage run -m unittest discover -s tests -v
      - name: Exercise the pinned-source build
        run: |
          coverage run --append -m open_tennis_data.cli build \
            --years "$(date -u +%Y)" --as-of "$(date -u +%F)" \
            --output "$RUNNER_TEMP/tennis-data"
      - run: coverage run --append -m open_tennis_data.cli validate --data "$RUNNER_TEMP/tennis-data"
      - run: |
          coverage run --append -m open_tennis_data.cli query \
            --data "$RUNNER_TEMP/tennis-data" --tour all \
            --sql "SELECT tour, count(*) FROM matches GROUP BY tour"
      - run: |
          coverage run --append -m open_tennis_data.cli extract \
            --data "$RUNNER_TEMP/tennis-data" --tour atp --levels itf \
            --output "$RUNNER_TEMP/itf.parquet"
      - run: |
          coverage run --append -m open_tennis_data.cli refresh-wikimedia \
            --data "$RUNNER_TEMP/tennis-data" --as-of "$(date -u +%F)"
      - run: |
          coverage run --append -m open_tennis_data.cli audit-retroactive \
            --data "$RUNNER_TEMP/tennis-data" --as-of "$(date -u +%F)" \
            --output "$RUNNER_TEMP/retroactive-audit"
      - run: |
          coverage run --append -m open_tennis_data.cli downloads \
            --data "$RUNNER_TEMP/tennis-data" --output "$RUNNER_TEMP/downloads"
      - run: bash scripts/verify-downloads.sh "$RUNNER_TEMP/downloads"
      - run: |
          coverage run --append -m open_tennis_data.cli downloads --future-only \
            --data "$RUNNER_TEMP/tennis-data" --output "$RUNNER_TEMP/future-downloads"
      - run: bash scripts/verify-downloads.sh "$RUNNER_TEMP/future-downloads" future
      - run: cp -a "$RUNNER_TEMP/tennis-data" "$RUNNER_TEMP/tennis-copy"
      - run: |
          coverage run --append -m open_tennis_data.cli promote \
            --source "$RUNNER_TEMP/tennis-data" --target "$RUNNER_TEMP/tennis-copy"
      - run: coverage report --fail-under=90

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser

  required-status:
    if: always()
    needs: [test, integration-coverage, browser-smoke]
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      TEST_RESULT: ${{ needs.test.result }}
      INTEGRATION_RESULT: ${{ needs.integration-coverage.result }}
      BROWSER_RESULT: ${{ needs.browser-smoke.result }}
    steps:
      - name: Publish required validation status
        run: |
          state=failure
          description="Data validation failed"
          if [ "$TEST_RESULT" = success ] && [ "$INTEGRATION_RESULT" = success ] && [ "$BROWSER_RESULT" = success ]; then
            state=success
            description="Python, integration, data, and browser validation passed"
          fi
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$STATUS_SHA" \
            -f state="$state" \
            -f context=data-required \
            -f description="$description"
          test "$state" = success
