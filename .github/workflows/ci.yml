name: Validate Open Tennis Data v3

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: ruff check src tests
      - run: mypy src/open_tennis_data
      - run: coverage run -m unittest discover -s tests -v
      - run: coverage report
      - run: open-tennis-data validate

  release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[dev]'
      - name: Build the release twice from pinned observations
        run: |
          for output in release-a release-b; do
            open-tennis-data release \
              --data data \
              --output "$RUNNER_TEMP/$output" \
              --as-of 2026-07-24T04:17:00Z \
              --tag data-v3-ci
            open-tennis-data verify-release --directory "$RUNNER_TEMP/$output"
          done
      - name: Require byte-identical assets
        run: |
          while read -r filename; do
            cmp "$RUNNER_TEMP/release-a/$filename" "$RUNNER_TEMP/release-b/$filename"
          done < scripts/v3-release-assets.txt
      - name: Prove the stable gate is fail-closed while coverage is preview
        run: |
          ! open-tennis-data verify-release \
            --directory "$RUNNER_TEMP/release-a" \
            --require-complete
