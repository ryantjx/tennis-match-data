name: Validate Open Tennis Data v3

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install '.[dev]'
      - run: ruff check src tests
      - run: mypy src/open_tennis_data
      - run: coverage run -m unittest discover -s tests -v
      - run: coverage report

  release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[dev]'
      - name: Verify deterministic source-attributed release contract
        run: python -m unittest tests.test_release -v

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Exercise the explorer against an immutable v3 release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run test:browser

  required-status:
    if: always()
    needs: [test, release-contract, browser-smoke]
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      TEST_RESULT: ${{ needs.test.result }}
      RELEASE_CONTRACT_RESULT: ${{ needs.release-contract.result }}
      BROWSER_RESULT: ${{ needs.browser-smoke.result }}
    steps:
      - name: Publish required data status
        run: |
          state=failure
          description="Open Tennis Data v3 validation failed"
          if [ "$TEST_RESULT" = success ] && [ "$RELEASE_CONTRACT_RESULT" = success ] && [ "$BROWSER_RESULT" = success ]; then
            state=success
            description="Python, release contract, and explorer checks passed"
          fi
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$STATUS_SHA" \
            -f state="$state" \
            -f context=data-required \
            -f description="$description"
          test "$state" = success
