name: Deploy Open Tennis Data Explorer

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/prepare-site-data.py"
      - "package.json"
      - "package-lock.json"
      - "tests/browser/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily Open Tennis Data v3 release"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Prepare the newest verified release snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/prepare-site-data.py --output site/data
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
