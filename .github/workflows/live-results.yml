name: Daily Open Tennis Data v3 release

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: tennis-v3-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - name: Build a fresh 2020+ staging dataset
        run: |
          open-tennis-data bootstrap \
            --through-year "$(date -u +%Y)" \
            --as-of "$(date -u +%F)" \
            --output "$RUNNER_TEMP/staged-data"
      - name: Validate staging
        run: open-tennis-data validate --data "$RUNNER_TEMP/staged-data"
      - name: Build deterministic v3 assets
        id: release
        run: |
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          tag="data-v3-$timestamp"
          open-tennis-data release \
            --data "$RUNNER_TEMP/staged-data" \
            --output "$RUNNER_TEMP/v3-release" \
            --as-of "$(date -u +%FT%TZ)" \
            --tag "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Verify, upload, redownload, and publish atomically
        run: |
          scripts/publish-v3-release.sh \
            "$RUNNER_TEMP/v3-release" \
            "${{ steps.release.outputs.tag }}"
