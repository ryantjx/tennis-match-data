name: Refresh current results and fixtures

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: open-tennis-data refresh-wikimedia --as-of "$(date -u +%F)"
      - run: open-tennis-data validate
      - run: |
          bash scripts/commit-data.sh "data: refresh current Wikimedia results and fixtures"
