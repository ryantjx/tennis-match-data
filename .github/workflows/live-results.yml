name: Refresh current results and fixtures

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: open-tennis-data refresh-wikimedia --as-of "$(date -u +%F)"
      - run: open-tennis-data validate
      - run: |
          bash scripts/commit-data.sh "data: refresh current Wikimedia results and fixtures"
