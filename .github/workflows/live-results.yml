name: Refresh current results and fixtures

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: open-tennis-data refresh-wikimedia --as-of "$(date -u +%F)"
      - run: open-tennis-data validate
      - run: |
          bash scripts/commit-data.sh "data: refresh current Wikimedia results and fixtures"
