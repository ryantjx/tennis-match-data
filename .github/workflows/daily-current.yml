name: Refresh current-year data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - name: Refresh only the current result year and fixture horizon
        run: open-tennis-data refresh-current --as-of "$(date -u +%F)"
      - run: open-tennis-data validate
      - name: Test every checked-in year
        run: python -m unittest tests.test_data_quality -v
      - run: |
          bash scripts/commit-data.sh "data: reconcile current results and rankings"
      - name: Build rolling direct downloads
        run: open-tennis-data downloads --output "$RUNNER_TEMP/downloads"
      - run: bash scripts/verify-downloads.sh "$RUNNER_TEMP/downloads"
      - name: Publish rolling direct downloads
        run: bash scripts/publish-downloads.sh "$RUNNER_TEMP/downloads"
      - name: Verify published rolling downloads
        run: |
          mkdir "$RUNNER_TEMP/published-downloads"
          gh release download data-latest --pattern '*.parquet' \
            --dir "$RUNNER_TEMP/published-downloads" --clobber
          bash scripts/verify-downloads.sh "$RUNNER_TEMP/published-downloads"
      - name: Build rolling future-only downloads
        run: |
          open-tennis-data downloads --future-only \
            --output "$RUNNER_TEMP/future-downloads"
      - run: bash scripts/verify-downloads.sh "$RUNNER_TEMP/future-downloads" future
      - name: Publish rolling future-only downloads
        run: |
          bash scripts/publish-downloads.sh \
            "$RUNNER_TEMP/future-downloads" future-latest
      - name: Verify published future-only downloads
        run: |
          mkdir "$RUNNER_TEMP/published-future-downloads"
          gh release download future-latest --pattern '*.parquet' \
            --dir "$RUNNER_TEMP/published-future-downloads" --clobber
          bash scripts/verify-downloads.sh \
            "$RUNNER_TEMP/published-future-downloads" future
