name: Reconcile current source files and rankings

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - name: Build isolated full source view
        run: open-tennis-data build --years "1968:$(date -u +%Y)" --as-of "$(date -u +%F)" --output "$RUNNER_TEMP/generated/data"
      - run: open-tennis-data validate --data "$RUNNER_TEMP/generated/data"
      - name: Promote semantic partition changes only
        run: open-tennis-data promote --source "$RUNNER_TEMP/generated/data" --target data
      - run: open-tennis-data validate
      - run: |
          bash scripts/commit-data.sh "data: reconcile current results and rankings"
      - name: Build rolling direct downloads
        run: open-tennis-data downloads --output "$RUNNER_TEMP/downloads"
      - name: Publish rolling direct downloads
        run: bash scripts/publish-downloads.sh "$RUNNER_TEMP/downloads"
      - name: Build rolling future-only downloads
        run: |
          open-tennis-data downloads --future-only \
            --output "$RUNNER_TEMP/future-downloads"
      - name: Publish rolling future-only downloads
        run: |
          bash scripts/publish-downloads.sh \
            "$RUNNER_TEMP/future-downloads" future-latest
