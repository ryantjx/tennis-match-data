name: Full historical audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * 1"

permissions:
  contents: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: open-tennis-data build --years "1968:$(date -u +%Y)" --as-of "$(date -u +%F)" --output "$RUNNER_TEMP/generated/data"
      - run: open-tennis-data validate --data "$RUNNER_TEMP/generated/data"
      - run: open-tennis-data promote --source "$RUNNER_TEMP/generated/data" --target data
      - run: open-tennis-data validate
      - run: |
          bash scripts/commit-data.sh "data: complete weekly source and coverage audit"
