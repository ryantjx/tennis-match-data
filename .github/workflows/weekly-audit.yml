name: Weekly retroactive audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tennis-data-writer
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - name: Audit previous/current results and future fixtures
        run: |
          open-tennis-data audit-retroactive \
            --as-of "$(date -u +%F)" \
            --output "$RUNNER_TEMP/retroactive-audit"
      - name: Validate the assembled repository
        run: open-tennis-data validate
      - name: Test every historical partition
        run: python -m unittest tests.test_data_quality -v
      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: retroactive-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/retroactive-audit/
          if-no-files-found: error
      - name: Open a review-only data pull request when needed
        run: |
          bash scripts/open-audit-pr.sh \
            "$RUNNER_TEMP/retroactive-audit/retroactive-audit.md"
