name: Weekly 2020+ retroactive audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 7 * * 1"

permissions:
  contents: read

concurrency:
  group: tennis-v3-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - name: Audit every v3 result season and current/future fixtures
        run: |
          open-tennis-data audit-retroactive \
            --years "2020:$(date -u +%Y)" \
            --as-of "$(date -u +%F)" \
            --output "$RUNNER_TEMP/retroactive-audit"
      - name: Validate the audited staging state
        run: open-tennis-data validate
      - name: Upload the immutable audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: retroactive-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/retroactive-audit/
          if-no-files-found: error
